services:
  php-apache:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: miniTPIran-web
    ports:
      - "8083:80"
    volumes:
      - ./:/var/www/html
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: mini_tp_iran
      DB_USERNAME: app
      DB_PASSWORD: app
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: miniTPIran-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mini_tp_iran
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/script.sql:/docker-entrypoint-initdb.d/script.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -proot || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  mysql-init:
    image: mysql:8.0
    container_name: miniTPIran-db-init
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./sql:/sql:ro
    command: >
      sh -c "
      echo 'Application du script SQL...';
      mysql -hmysql -uroot -proot mini_tp_iran < /sql/script.sql;
      echo 'Script SQL appliqué.'
      "
    restart: "no"

volumes:
  mysql_data: